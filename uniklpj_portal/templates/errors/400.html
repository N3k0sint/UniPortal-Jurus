{% extends "base.html" %}

{% block title %}400 - Bad Request{% endblock %}

{% block content %}
<div class="error-container glass-panel">
    <div class="error-code">400</div>
    <h1 class="error-title">Bad Request</h1>
    <p class="error-message">The server could not understand the request due to invalid syntax or parameters.</p>
    <a href="{{ url_for('portal.dashboard') }}" class="btn btn-primary">Return to Dashboard</a>
</div>
{% endblock %}
