{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="error-container glass-panel">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">The page you are looking for does not exist, has been removed, or is temporarily unavailable.</p>
    <a href="{{ url_for('portal.dashboard') }}" class="btn btn-primary">Return to Dashboard</a>
</div>
{% endblock %}
