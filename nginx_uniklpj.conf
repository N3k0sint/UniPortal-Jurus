# UniKL PJ Research Collaboration Portal - Secure Nginx Reverse Proxy Config

# Redirect all plain HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    server_tokens off; # Hide version banner on HTTP redirect
    return 301 https://$host$request_uri;
}

# HTTPS Server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # SSL Certificate Paths
    ssl_certificate /etc/ssl/certs/uniklpj.crt;
    ssl_certificate_key /etc/ssl/private/uniklpj.key;

    # SSL TLS Hardening Policies (TLS 1.3 Only, disabling vulnerable TLS 1.0, 1.1, 1.2)
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Hide Nginx version banner for security
    server_tokens off;

    # Strict upload limits (max 10MB, matching Flask MAX_CONTENT_LENGTH)
    client_max_body_size 10M;

    # HTTP Security Headers (Defense-in-depth)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reverse proxy settings to forward requests to Gunicorn daemon
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer and timeout settings
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }

    # Serve static assets directly for performance optimization
    location /static/ {
        alias /var/www/uniklpj/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
